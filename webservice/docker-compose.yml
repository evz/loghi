version: '3.1'
services:
  laypa:
    image: 'loghi/docker.laypa'
    command: 'python api/gunicorn_app.py'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    container_name: 'laypa'
    ports:
      - '5000:5000'
    environment:
      LAYPA_MAX_QUEUE_SIZE: 128
      LAYPA_MODEL_BASE_PATH: /home/eric/code/loghi/models/laypa-baseline
      LAYPA_OUTPUT_BASE_PATH: /home/eric/code/loghi/webservice-data/laypa-output
      LAYPA_LEDGER_SIZE: 1000000
      GUNICORN_RUN_HOST: '0.0.0.0:5000'
      GUNICORN_WORKERS: 1
      GUNICORN_THREADS: 1
      GUNICORN_ACCESSLOG: '-'
    volumes:
      - '/home/eric/code/loghi/models/laypa-baseline:/home/eric/code/loghi/models/laypa-baseline'
      - '/home/eric/code/loghi/webservice-data/laypa-output:/home/eric/code/loghi/webservice-data/laypa-output'
    networks:
      - pipeline
    shm_size: 512mb
    restart: always
  loghi-tooling:
    image: 'loghi/docker.loghi-tooling'
    command: '/src/loghi-tooling/loghiwebservice/target/appassembler/bin/LoghiWebserviceApplication server /home/eric/code/loghi/webservice/loghi-tooling/configuration.yml'
    container_name: 'loghi-tooling'
    user: '1000:1000'
    ports:
      - '8080:8080'
      - '8081:8081'
    environment:
      STORAGE_LOCATION: /home/eric/code/loghi/webservice-data/storage
      P2PALA_CONFIG_FILE: /doesnotexist
      EXTRACT_BASELINES_MAX_THREADS: 4
      EXTRACT_BASELINES_QUEUE_LENGTH: 64
      CUT_FROM_IMAGE_MAX_THREADS: 4
      CUT_FROM_IMAGE_QUEUE_LENGTH: 64
      LOGHI_HTR_MERGE_PAGE_MAX_THREADS: 4
      LOGHI_HTR_MERGE_PAGE_QUEUE_LENGTH: 64
      RECALCULATE_READING_ORDER_NEW_MAX_THREADS: 4
      RECALCULATE_READING_ORDER_NEW_QUEUE_LENGTH: 64
      SPLIT_PAGE_TEXT_LINE_INTO_WORDS_MAX_THREADS: 4
      SPLIT_PAGE_TEXT_LINE_INTO_WORDS_QUEUE_LENGTH: 64
      DETECT_LANGUAGE_OF_PAGE_XML_MAX_THREADS: 4
      DETECT_LANGUAGE_OF_PAGE_XML_QUEUE_LENGTH: 64
    volumes:
      - '/home/eric/code/loghi/webservice/loghi-tooling/configuration.yml:/home/eric/code/loghi/webservice/loghi-tooling/configuration.yml'
      - '/home/eric/code/loghi/webservice-data/storage:/home/eric/code/loghi/webservice-data/storage'
    networks:
      - pipeline
    shm_size: 512mb
    restart: always
  htr:
    image: 'loghi/docker.htr'
    command: sh -c 'cd /src/loghi-htr/src/api && uvicorn app:app --host 0.0.0.0 --port 5000'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    container_name: 'htr'
    user: '1000:1000'
    ports:
      - '5001:5000'
    environment:
      LOGHI_BASE_MODEL_DIR: '/home/eric/code/loghi/models/loghi-htr-generic'
      LOGHI_MODEL_NAME: 'generic-2023-02-15'
      LOGHI_BATCH_SIZE: 64
      LOGHI_OUTPUT_PATH: '/home/eric/code/loghi/webservice-data/htr-output'
      LOGHI_MAX_QUEUE_SIZE: 50000
      LOGHI_PATIENCE: 0.5
      LOGHI_GPUS: '0'
    volumes:
      - '/home/eric/code/loghi/models/loghi-htr-generic:/home/eric/code/loghi/models/loghi-htr-generic'
      - '/home/eric/code/loghi/webservice-data/htr-output:/home/eric/code/loghi/webservice-data/htr-output'
    networks:
      - pipeline
    shm_size: 512mb
    restart: always
networks:
  pipeline:
